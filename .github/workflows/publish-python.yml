name: Publish Python Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing git tag to validate, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-python-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./python[all,test,dev]"

      - name: Validate release tag and version alignment
        run: |
          python python/scripts/validate_publish_release.py \
            --release-tag "${RELEASE_TAG}"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Build frontend bundles
        run: npm run build

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run frontend tests
        run: npm test

      - name: Synchronize Python assets
        run: npm run build:python-assets

      - name: Verify synchronized Python assets
        run: npm run verify:python-assets

      - name: Run Python tests
        working-directory: python
        run: python -m pytest

      - name: Build Python distributions
        working-directory: python
        run: |
          rm -rf build dist src/*.egg-info
          python -m build

      - name: Validate distribution metadata
        working-directory: python
        run: python -m twine check dist/*

      - name: Inspect wheel contents
        working-directory: python
        run: python scripts/check_wheel_contents.py dist/*.whl

      - name: Verify clean wheel installs
        working-directory: python
        run: python scripts/verify_wheel_installs.py dist/*.whl

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist
          if-no-files-found: error

  publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
