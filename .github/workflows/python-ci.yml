name: Python CI

on:
  push:
    paths:
      - "packages/python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "packages/python/**"
      - ".github/workflows/python-ci.yml"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/python/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:python-assets
      - run: npm run verify:python-assets
      - uses: actions/upload-artifact@v4
        with:
          name: python-static-assets
          path: packages/python/src/olloweditor/static/olloweditor
          include-hidden-files: true
          if-no-files-found: error

  python:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-static-assets
          path: packages/python/src/olloweditor/static/olloweditor
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./packages/python[all,test,dev]"
      - name: Run tests
        working-directory: packages/python
        run: python -m pytest
      - name: Run Ruff
        if: matrix.python-version == '3.12'
        working-directory: packages/python
        run: |
          python -m ruff check .
          python -m ruff format --check .
      - name: Run mypy
        if: matrix.python-version == '3.12'
        working-directory: packages/python
        run: python -m mypy src

  package:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-static-assets
          path: packages/python/src/olloweditor/static/olloweditor
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./packages/python[all,test,dev]"
      - name: Build and inspect distributions
        working-directory: packages/python
        run: |
          python -m build --outdir python-dist
          python -m twine check python-dist/*
          python scripts/check_wheel_contents.py python-dist/*.whl
          python scripts/verify_wheel_installs.py python-dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: packages/python/python-dist
          if-no-files-found: error
