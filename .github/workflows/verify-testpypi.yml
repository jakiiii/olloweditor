name: Verify TestPyPI Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: TestPyPI package version to verify
        required: true
        type: string
      keep_environments:
        description: Keep temporary verification environments on the runner
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install verifier test requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run TestPyPI verifier
        working-directory: python
        run: |
          ARGS=(
            scripts/verify_testpypi_release.py
            --package olloweditor
            --version "${{ inputs.version }}"
            --verbose
          )
          if [ "${{ inputs.keep_environments }}" = "true" ]; then
            ARGS+=(--keep-environments)
          fi
          python "${ARGS[@]}"

      - name: Upload TestPyPI verification reports
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-verification
          path: |
            python/TESTPYPI_VERIFICATION.md
            python/testpypi-verification.json
          if-no-files-found: error
