<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OllowEditor Dev Server</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f7;
      --surface: #ffffff;
      --border: #d9dde3;
      --text: #111827;
      --muted: #4b5563;
      --accent: #b91c1c;
      --accent-hover: #991b1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .panel {
      margin-top: 32px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
    }

    .link-grid {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    a {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
    }

    .path {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main>
    <h1>OllowEditor Dev Server</h1>
    <p>Select a page to preview OllowEditor during package development.</p>

    <section class="panel" aria-label="Preview pages">
      <div class="link-grid">
        <a href="/website/index.html">
          Website Home
          <span class="path">/website/index.html</span>
        </a>
        <a href="/website/documentation.html">
          Website Documentation
          <span class="path">/website/documentation.html</span>
        </a>
        <a href="/examples/vanilla-js/index.html">
          Vanilla JavaScript Example
          <span class="path">/examples/vanilla-js/index.html</span>
        </a>
        <a href="/examples/vanilla-ts/index.html">
          Vanilla TypeScript Example
          <span class="path">/examples/vanilla-ts/index.html</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
